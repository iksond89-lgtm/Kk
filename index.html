<<!<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高中英文單字多冊複習系統</title>
    <script src="b1-vocab.js"></script>
    <style>
        :root { --primary: #4a90e2; --success: #2ecc71; --error: #e74c3c; --background: #f5f7fa; --card: #ffffff; --text: #2c3e50; }
        body { font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif; background-color: var(--background); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .quiz-container { background-color: var(--card); border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.05); width: 100%; max-width: 550px; padding: 30px; box-sizing: border-box; }
        .screen { display: none; }
        .screen.active { display: block; }
        .grid-menu { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
        .menu-btn { background-color: #f8fafc; border: 2px solid #e2e8f0; border-radius: 12px; padding: 16px; font-weight: bold; cursor: pointer; transition: all 0.2s; }
        .menu-btn:hover { border-color: var(--primary); background-color: #ebf8ff; color: var(--primary); }
        .word { font-size: 32px; font-weight: 700; text-align: center; margin: 30px 0; }
        .option-btn { background-color: #f8fafc; border: 2px solid #e2e8f0; border-radius: 10px; padding: 14px 20px; margin-bottom: 10px; width: 100%; cursor: pointer; text-align: left; }
        .option-btn.correct { background-color: #def7ec; border-color: var(--success); }
        .option-btn.wrong { background-color: #fde8e8; border-color: var(--error); }
    </style>
</head>
<body>
    <div class="quiz-container">
        <div id="book-screen" class="screen active">
            <h2>📚 選擇英文選冊</h2>
            <div class="grid-menu">
                <button class="menu-btn" onclick="selectBook('b1')">第一冊 (Book 1)</button>
            </div>
        </div>

        <div id="unit-screen" class="screen">
            <h2>🔍 選擇單元</h2>
            <div class="grid-menu" id="unit-grid"></div>
        </div>

        <div id="mode-screen" class="screen">
            <h2>⚙️ 選擇模式</h2>
            <button class="menu-btn" style="width:100%" onclick="setMode('engToCh')">英翻中</button>
            <button class="menu-btn" style="width:100%" onclick="setMode('chToEng')">中翻英</button>
        </div>

        <div id="quiz-screen" class="screen">
            <div id="target-question" class="word"></div>
            <div id="options-container"></div>
            <button id="next-btn" style="display:none; width:100%; padding:15px;" onclick="nextQuestion()">下一題</button>
        </div>
    </div>

    <script>
        let selectedBookId = "", selectedUnitNum = 0, quizMode = "engToCh", wordList = [], quizQuestions = [], currentIndex = 0, correctAnswersCount = 0;

        function switchScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function selectBook(bookId) {
            selectedBookId = bookId;
            const container = document.getElementById("unit-grid");
            container.innerHTML = "";
            for(let i=1; i<=10; i++) {
                let btn = document.createElement("button");
                btn.className = "menu-btn";
                btn.innerText = "Unit " + i;
                btn.onclick = () => selectUnit(i);
                container.appendChild(btn);
            }
            switchScreen("unit-screen");
        }

        function selectUnit(unitNum) {
            selectedUnitNum = unitNum;
            const data = (typeof WORD_DATA !== 'undefined' && WORD_DATA[selectedBookId] && WORD_DATA[selectedBookId][unitNum]) ? WORD_DATA[selectedBookId][unitNum] : null;
            if (!data || data.length < 4) { alert("該單元單字不足，請選擇其他單元。"); return; }
            wordList = data;
            switchScreen("mode-screen");
        }

        function setMode(mode) {
            quizMode = mode;
            let shuffled = [...wordList].sort(() => 0.5 - Math.random());
            quizQuestions = shuffled.map(item => {
                let options = [item.ch, ...wordList.filter(w => w.ch !== item.ch).sort(() => 0.5 - Math.random()).slice(0, 3).map(w => w.ch)];
                if(mode === 'chToEng') options = [item.eng, ...wordList.filter(w => w.eng !== item.eng).sort(() => 0.5 - Math.random()).slice(0, 3).map(w => w.eng)];
                return { question: (mode === 'engToCh' ? item.eng : item.ch), answer: (mode === 'engToCh' ? item.ch : item.eng), options: options.sort(() => 0.5 - Math.random()) };
            });
            currentIndex = 0;
            switchScreen("quiz-screen");
            showQuestion();
        }

        function showQuestion() {
            const q = quizQuestions[currentIndex];
            document.getElementById("target-question").innerText = q.question;
            const container = document.getElementById("options-container");
            container.innerHTML = "";
            q.options.forEach(opt => {
                let btn = document.createElement("button");
                btn.className = "option-btn";
                btn.innerText = opt;
                btn.onclick = () => {
                    if(opt === q.answer) btn.classList.add("correct");
                    else btn.classList.add("wrong");
                    document.getElementById("next-btn").style.display = "block";
                };
                container.appendChild(btn);
            });
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex < quizQuestions.length) {
                document.getElementById("next-btn").style.display = "none";
                showQuestion();
            } else {
                alert("測驗結束！");
                switchScreen("book-screen");
            }
        }
    </script>
</body>
</html>
