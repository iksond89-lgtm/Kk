<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>簡宜學測複習</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>簡宜學測複習</h1>
        
        <div id="setup">
            <select id="unitSelect"></select>
            <div class="buttons">
                <button onclick="startQuiz('CHI_ENG')">中翻英</button>
                <button onclick="startQuiz('ENG_CHI')">英翻中</button>
            </div>
        </div>

        <div id="quizArea" style="display:none;">
            <h2 id="questionHeader"></h2>
            <h1 id="wordDisplay"></h1>
            <input type="text" id="answer" placeholder="輸入答案並按 Enter" autocomplete="off">
            <button onclick="checkAnswer()">確認</button>
        </div>

        <div id="resultArea" style="display:none;">
            <h2>測驗結果</h2>
            <div id="wrongWords"></div>
            <button onclick="location.reload()">重新選擇</button>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
