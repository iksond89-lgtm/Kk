<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高中英文單字多冊複習系統 v2</title>
    <script src="b1-vocab.js"></script>
    <script src="b1-idiom.js"></script>
    <style>
        :root {
            --primary: #4a90e2;
            --success: #2ecc71;
            --error: #e74c3c;
            --background: #f5f7fa;
            --card: #ffffff;
            --text: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, "Microsoft JhengHei";
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-container {
            background-color: var(--card);
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 550px;
            padding: 30px;
            box-sizing: border-box;
        }

        .screen { display: none; }
        .screen.active { display: block; }
        h2 { text-align: center; margin-top: 0; color: var(--text); }
        .subtitle { text-align: center; color: #7f8c8d; margin-bottom: 24px; }

        .grid-menu {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
        }

        .menu-btn {
            background-color: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 16px;
            font-size: 16px;
            font-weight: bold;
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .menu-btn:hover {
            border-color: var(--primary);
            background-color: #ebf8ff;
            color: var(--primary);
            transform: translateY(-2px);
        }

        .btn-back {
            grid-column: span 2;
            background-color: #7f8c8d;
            color: white;
            border: none;
        }
    </style>
</head>
<body>

    <div class="quiz-container">
        <div id="book-screen" class="screen active">
            <h2>請選擇要複習的</h2>
            <div class="subtitle">💦💦💦💦💦💦💦💦💦</div>
            <div class="grid-menu">
                <button class="menu-btn" onclick="selectBook('b1')">簡宜學測複習</button>
                <button class="menu-btn" onclick="selectBook('core')">核心字彙</button>
            </div>
        </div>

        <!-- 核心字彙難度選擇 -->
        <div id="core-level-screen" class="screen">
            <h2>🔰 核心字彙</h2>
            <div class="subtitle">請選擇難度</div>
            <div class="grid-menu">
                <button class="menu-btn" onclick="selectCoreLevel('basic')">Basic</button>
                <button class="menu-btn" onclick="selectCoreLevel('advance')">Advance</button>
                <button class="menu-btn btn-back" onclick="switchScreen('book-screen')">⬅ 回到選冊</button>
            </div>
        </div>

        <!-- 單元選擇 -->
        <div id="unit-screen" class="screen">
            <h2>🔍 選擇單元</h2>
            <div class="subtitle" id="unit-screen-subtitle">請選擇單元</div>
            <div class="grid-menu" id="unit-grid"></div>
        </div>

        <div id="mode-screen" class="screen">
            <h2>⚙️ 選擇測驗模式</h2>
            <div class="subtitle" id="mode-screen-subtitle">請選擇出題版本</div>
            <div class="grid-menu" style="grid-template-columns: 1fr;">
                <button class="menu-btn" onclick="setMode('engToCh')">英翻中</button>
                <button class="menu-btn" onclick="setMode('chToEng')">中翻英</button>
                <button class="menu-btn btn-back" onclick="backToUnit()">⬅ 回到選單元</button>
            </div>
        </div>

        <!-- 測驗畫面 -->
        <div id="quiz-screen" class="screen">
            <div class="header">
                <div class="title" id="quiz-title">單字大挑戰</div>
                <div class="progress" id="progress-text">1 / --</div>
            </div>
            <div class="word-box">
                <div class="quiz-type-tag" id="quiz-type">題型</div>
                <div class="word" id="target-question">loading...</div>
            </div>
            <div class="options-grid" id="options-container"></div>
            <div class="feedback" id="feedback-text"></div>
            <button class="next-btn" id="next-btn" onclick="nextQuestion()">下一題 ➔</button>
        </div>

        <div id="result-screen" class="screen" style="text-align: center;">
            <h2>測驗結束</h2>
            <p id="stats-text">答對題數：0 / 0</p>
            <div class="score-big" id="final-score">0</div>
            <p id="evaluation-text"></p>
            <div id="wrong-answers-section" style="display:none;">
                <div class="wrong-title">❌ 本次錯題紀錄庫：</div>
                <div class="wrong-list" id="wrong-list-container"></div>
            </div>
            <div class="btn-group">
                <button class="btn-retry" onclick="retryQuiz()">再測一次</button>
                <button class="btn-home" onclick="switchScreen('book-screen')">回首頁</button>
            </div>
        </div>
    </div>

    <script>
        let selectedBookId = "";
        let selectedCoreLevel = "";
        let selectedUnitNum = 0;
        let quizMode = "engToCh"; 
        let wordList = [];
        let quizQuestions = [];
        let currentIndex = 0;
        let correctAnswersCount = 0;
        let hasAnswered = false;
        let wrongRecords = []; 

        function switchScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function selectBook(bookId) {
            selectedBookId = bookId;
            selectedCoreLevel = "";

            if (bookId === 'core') {
                switchScreen('core-level-screen');
            } else {
                showUnitSelection(bookId);
            }
        }

        function selectCoreLevel(level) {
            selectedCoreLevel = level;
            showUnitSelection('core');
        }

        function showUnitSelection(bookId) {
            const unitGrid = document.getElementById("unit-grid");
            unitGrid.innerHTML = "";

            let maxUnit = (bookId === 'b1') ? 10 : 18;
            let subtitle = bookId === 'core' 
                ? `核心字彙 - ${selectedCoreLevel.toUpperCase()}：請選擇單元` 
                : `簡宜學測複習：請選擇單元 (1-${maxUnit})`;

            document.getElementById("unit-screen-subtitle").innerText = subtitle;

            for (let i = 1; i <= maxUnit; i++) {
                const btn = document.createElement("button");
                btn.className = "menu-btn";
                btn.innerText = `Unit ${i}`;
                btn.onclick = () => selectUnit(i);
                unitGrid.appendChild(btn);
            }

            const backBtn = document.createElement("button");
            backBtn.className = "menu-btn btn-back";
            if (bookId === 'core') {
                backBtn.innerText = "⬅ 回到選擇難度";
                backBtn.onclick = () => switchScreen('core-level-screen');
            } else {
                backBtn.innerText = "⬅ 回到選冊";
                backBtn.onclick = () => switchScreen('book-screen');
            }
            unitGrid.appendChild(backBtn);

            switchScreen("unit-screen");
        }

        function selectUnit(unitNum) {
            selectedUnitNum = unitNum;

            let wData = [];
            let iData = [];

            if (selectedBookId === 'core' && selectedCoreLevel) {
                wData = WORD_DATA?.core?.[selectedCoreLevel]?.[unitNum] || [];
                iData = IDIOM_DATA?.core?.[selectedCoreLevel]?.[unitNum] || [];
            } else {
                wData = WORD_DATA?.[selectedBookId]?.[unitNum] || [];
                iData = IDIOM_DATA?.[selectedBookId]?.[unitNum] || [];
            }

            wordList = [...wData, ...iData];

            if (wordList.length === 0) {
                alert(`Unit ${unitNum} 目前沒有資料，請確認 JS 檔案內容。`);
                return;
            }

            const levelText = selectedCoreLevel ? ` - ${selectedCoreLevel.toUpperCase()}` : "";
            document.getElementById("mode-screen-subtitle").innerText = 
                `已選：${selectedBookId}${levelText} Unit ${unitNum}（共 ${wordList.length} 題）`;

            switchScreen("mode-screen");
        }

        function backToUnit() {
            showUnitSelection(selectedBookId);
        }

        function setMode(mode) {
            quizMode = mode;
            const levelText = selectedCoreLevel ? ` - ${selectedCoreLevel.toUpperCase()}` : "";
            document.getElementById("quiz-title").innerText = `${selectedBookId}${levelText} Unit ${selectedUnitNum}`;
            startQuiz();
        }

        // ==================== 測驗邏輯（不變） ====================
        function getPosTag(chText) {
            if (chText.includes("的")) return "[adj. 形容詞]";
            if (chText.includes("地")) return "[adv. 副詞]";
            if (chText.includes("使") || chText.includes("讓") || chText.includes("辦")) return "[v. 動詞]";
            if (chText.includes("；") || chText.length > 3) return "[n./v. 綜合]";
            return "[n. 名詞]";
        }

        function startQuiz() {
            wrongRecords = []; 
            let shuffledLesson = [...wordList].sort(() => 0.5 - Math.random());

            quizQuestions = shuffledLesson.map(item => {
                let wrongPool = wordList.filter(w => w.eng !== item.eng);
                let shuffledWrong = wrongPool.sort(() => 0.5 - Math.random()).slice(0, 3);
                
                if (quizMode === "engToCh") {
                    const options = [item.ch, ...shuffledWrong.map(w => w.ch)].sort(() => 0.5 - Math.random());
                    return {
                        rawWord: item.eng, rawCh: item.ch,
                        question: item.eng,
                        type: "請選擇正確的中文意思",
                        options, answer: item.ch
                    };
                } else {
                    const pos = getPosTag(item.ch);
                    const options = [item.eng, ...shuffledWrong.map(w => w.eng)].sort(() => 0.5 - Math.random());
                    return {
                        rawWord: item.eng, rawCh: item.ch,
                        question: `${pos} ${item.ch}`,
                        type: "請選擇正確的英文單字",
                        options, answer: item.eng
                    };
                }
            });

            currentIndex = 0;
            correctAnswersCount = 0;
            switchScreen("quiz-screen");
            showQuestion();
        }

        function showQuestion() {
            hasAnswered = false;
            document.getElementById("next-btn").style.display = "none";
            document.getElementById("feedback-text").innerText = "";
            const q = quizQuestions[currentIndex];
            document.getElementById("progress-text").innerText = `${currentIndex + 1} / ${quizQuestions.length}`;
            document.getElementById("quiz-type").innerText = q.type;
            document.getElementById("target-question").innerText = q.question;

            const container = document.getElementById("options-container");
            container.innerHTML = "";
            q.options.forEach(opt => {
                const btn = document.createElement("button");
                btn.className = "option-btn";
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(opt, btn);
                container.appendChild(btn);
            });
        }

        function checkAnswer(selectedOpt, clickedBtn) {
            if (hasAnswered) return;
            hasAnswered = true;
            const q = quizQuestions[currentIndex];
            const buttons = document.getElementsByClassName("option-btn");

            if (selectedOpt === q.answer) {
                clickedBtn.classList.add("correct");
                document.getElementById("feedback-text").innerHTML = `<span style="color:var(--success)">✔ 答對了！</span>`;
                correctAnswersCount++;
            } else {
                clickedBtn.classList.add("wrong");
                for (let btn of buttons) {
                    if (btn.innerText === q.answer) btn.classList.add("correct");
                }
                document.getElementById("feedback-text").innerHTML = `<span style="color:var(--error)">❌ 答案是：${q.answer}</span>`;
                wrongRecords.push({ eng: q.rawWord, ch: q.rawCh, yourAnswer: selectedOpt });
            }
            document.getElementById("next-btn").style.display = "block";
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex < quizQuestions.length) showQuestion();
            else showResult();
        }

        function showResult() {
            switchScreen("result-screen");
            let finalScore = Math.round((correctAnswersCount / quizQuestions.length) * 100);
            document.getElementById("stats-text").innerText = `答對題數：${correctAnswersCount} / ${quizQuestions.length}`;
            document.getElementById("final-score").innerText = finalScore;
            
            let evalText = finalScore === 100 ? "太強了！保持下去！" : 
                          (finalScore >= 80 ? "很棒！繼續加油" : 
                          (finalScore >= 60 ? "還可以再加強喔" : "下次努力！"));
            document.getElementById("evaluation-text").innerText = evalText;

            const wrongSection = document.getElementById("wrong-answers-section");
            if (wrongRecords.length > 0) {
                wrongSection.style.display = "block";
                document.getElementById("wrong-list-container").innerHTML = wrongRecords.map((item, i) => 
                    `<div class="wrong-item"><strong>${i+1}. ${item.eng}</strong> (${item.ch})<br><span style="color:var(--error)">你的答案: ${item.yourAnswer}</span></div>`
                ).join("");
            } else {
                wrongSection.style.display = "none";
            }
        }

        function retryQuiz() { startQuiz(); }
    </script>
</body>
</html>
