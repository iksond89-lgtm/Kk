
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高中英文單字多冊複習系統 v2</title>
    <script src="b1-vocab.js"></script>
    <script src="b1-idiom.js"></script>
    <style>
        :root {
            --primary: #4a90e2;
            --success: #2ecc71;
            --error: #e74c3c;
            --background: #f5f7fa;
            --card: #ffffff;
            --text: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, "Microsoft JhengHei";
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-container {
            background-color: var(--card);
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 550px;
            padding: 30px;
            box-sizing: border-box;
        }

        .screen { display: none; }
        .screen.active { display: block; }
        h2 { text-align: center; margin-top: 0; color: var(--text); }
        .subtitle { text-align: center; color: #7f8c8d; margin-bottom: 24px; }

        .grid-menu {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
        }

        .menu-btn {
            background-color: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 16px;
            font-size: 16px;
            font-weight: bold;
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .menu-btn:hover {
            border-color: var(--primary);
            background-color: #ebf8ff;
            color: var(--primary);
            transform: translateY(-2px);
        }

        .btn-back {
            grid-column: span 2;
            background-color: #7f8c8d;
            color: white;
            border: none;
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; border-bottom: 2px solid #edf2f7; padding-bottom: 12px; }
        .title { font-size: 16px; font-weight: bold; color: var(--primary); }
        .progress { font-size: 14px; color: #7f8c8d; background: #e2e8f0; padding: 4px 10px; border-radius: 20px; }
        .word-box { text-align: center; margin: 30px 0; }
        .quiz-type-tag { display: inline-block; font-size: 12px; background-color: #ebf8ff; color: #2b6cb0; padding: 4px 12px; border-radius: 12px; margin-bottom: 12px; font-weight: bold; }
        .word { font-size: 32px; font-weight: 700; color: #1a202c; word-break: break-word; }
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-bottom: 24px; }
        
        .option-btn {
            background-color: #f8fafc; border: 2px solid #e2e8f0; border-radius: 10px;
            padding: 14px 20px; font-size: 16px; text-align: left; cursor: pointer; color: var(--text);
        }
        .option-btn.correct { background-color: #def7ec; border-color: #2ecc71; color: #03543f; font-weight: bold; }
        .option-btn.wrong { background-color: #fde8e8; border-color: #e74c3c; color: #9b1c1c; }

        .feedback { min-height: 40px; text-align: center; font-size: 16px; font-weight: 500; margin-bottom: 20px; }
        .next-btn { width: 100%; background-color: var(--primary); color: white; border: none; border-radius: 10px; padding: 14px; font-size: 16px; font-weight: bold; cursor: pointer; display: none; }
        
        .score-big { font-size: 64px; font-weight: 800; color: var(--primary); margin: 20px 0; text-align: center; }
        .btn-group { display: flex; gap: 10px; margin-top: 24px; flex-wrap: wrap; }
        .btn-group button { flex: 1; min-width: 120px; padding: 14px; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; border: none; }
        .btn-retry { background-color: #edf2f7; color: var(--text); }
        .btn-home { background-color: var(--text); color: white; }

        .wrong-list { text-align: left; background: #fff5f5; border: 1px solid #fed7d7; border-radius: 10px; padding: 15px; margin-top: 20px; max-height: 250px; overflow-y: auto; }
        .wrong-item { border-bottom: 1px solid #feb2b2; padding: 8px 0; font-size: 15px; }
        .wrong-item:last-child { border-bottom: none; }
        .wrong-title { color: #c53030; font-weight: bold; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div class="quiz-container">
        <div id="book-screen" class="screen active">
            <h2>📚 選擇英文選冊</h2>
            <div class="subtitle">請選擇你要複習的課本冊別</div>
            <div class="grid-menu">
                <button class="menu-btn" onclick="selectBook('b1')">第一冊 (Book 1)</button>
                <button class="menu-btn" onclick="selectBook('b2')">第二冊 (Book 2)</button>
                <button class="menu-btn" onclick="selectBook('b3')">第三冊 (Book 3)</button>
                <button class="menu-btn" onclick="selectBook('b4')">第四冊 (Book 4)</button>
            </div>
        </div>

        <div id="unit-screen" class="screen">
            <h2>🔍 選擇單元</h2>
            <div class="subtitle" id="unit-screen-subtitle">請選擇單元</div>
            <div class="grid-menu">
                <button class="menu-btn" onclick="selectUnit(1)">Unit 01</button>
                <button class="menu-btn" onclick="selectUnit(2)">Unit 02</button>
                <button class="menu-btn" onclick="selectUnit(3)">Unit 03</button>
                <button class="menu-btn" onclick="selectUnit(4)">Unit 04</button>
                <button class="menu-btn" onclick="selectUnit(5)">Unit 05</button>
                <button class="menu-btn" onclick="selectUnit(6)">Unit 06</button>
                <button class="menu-btn" onclick="selectUnit(7)">Unit 07</button>
                <button class="menu-btn" onclick="selectUnit(8)">Unit 08</button>
                <button class="menu-btn" onclick="selectUnit(9)">Unit 09</button>
                <button class="menu-btn" onclick="selectUnit(10)">Unit 10</button>
                <button class="menu-btn btn-back" onclick="switchScreen('book-screen')">⬅ 回到選冊</button>
            </div>
        </div>

        <div id="mode-screen" class="screen">
            <h2>⚙️ 選擇測驗模式</h2>
            <div class="subtitle" id="mode-screen-subtitle">請選擇出題版本</div>
            <div class="grid-menu" style="grid-template-columns: 1fr;">
                <button class="menu-btn" onclick="setMode('engToCh')">🔤 英翻中 (看英文選中文)</button>
                <button class="menu-btn" onclick="setMode('chToEng')">🇹🇼 中翻英 (看中文選英文 + 詞性提示)</button>
                <button class="menu-btn btn-back" onclick="switchScreen('unit-screen')">⬅ 回到選單元</button>
            </div>
        </div>

        <div id="quiz-screen" class="screen">
            <div class="header">
                <div class="title" id="quiz-title">單字大挑戰</div>
                <div class="progress" id="progress-text">1 / --</div>
            </div>
            <div class="word-box">
                <div class="quiz-type-tag" id="quiz-type">題型</div>
                <div class="word" id="target-question">loading...</div>
            </div>
            <div class="options-grid" id="options-container"></div>
            <div class="feedback" id="feedback-text"></div>
            <button class="next-btn" id="next-btn" onclick="nextQuestion()">下一題 ➔</button>
        </div>

        <div id="result-screen" class="screen" style="text-align: center;">
            <h2>🎉 測驗完成！</h2>
            <p id="stats-text">答對題數：0 / 0</p>
            <div class="score-big" id="final-score">0</div>
            <p id="evaluation-text"></p>
            <div id="wrong-answers-section" style="display:none;">
                <div class="wrong-title">❌ 本次錯題紀錄庫：</div>
                <div class="wrong-list" id="wrong-list-container"></div>
            </div>
            <div class="btn-group">
                <button class="btn-retry" onclick="retryQuiz()">再測一次</button>
                <button class="btn-home" onclick="switchScreen('book-screen')">回首頁 🏠</button>
            </div>
        </div>
    </div>

    <script>
        let selectedBookId = "";
        let selectedUnitNum = 0;
        let quizMode = "engToCh"; 
        let wordList = [];
        let quizQuestions = [];
        let currentIndex = 0;
        let correctAnswersCount = 0;
        let hasAnswered = false;
        let wrongRecords = []; 

        function getPosTag(chText) {
            if (chText.includes("的")) return "[adj. 形容詞]";
            if (chText.includes("地")) return "[adv. 副詞]";
            if (chText.includes("使") || chText.includes("讓") || chText.includes("辦")) return "[v. 動詞]";
            if (chText.includes("；") || chText.length > 3) return "[n./v. 綜合]";
            return "[n. 名詞]";
        }

        function switchScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function selectBook(bookId) {
            selectedBookId = bookId;
            const bookNum = bookId.replace("b", "");
            document.getElementById("unit-screen-subtitle").innerText = `目前已選：第 ${bookNum} 冊，請選單元`;
            switchScreen("unit-screen");
        }

        // 核心邏輯：合併單字 (50題) + 片語 (10題) = 60題
        function selectUnit(unitNum) {
            selectedUnitNum = unitNum;

            const wordData = (typeof WORD_DATA !== 'undefined' && WORD_DATA[selectedBookId] && WORD_DATA[selectedBookId][unitNum]) ? WORD_DATA[selectedBookId][unitNum] : [];
            const idiomData = (typeof IDIOM_DATA !== 'undefined' && IDIOM_DATA[selectedBookId] && IDIOM_DATA[selectedBookId][unitNum]) ? IDIOM_DATA[selectedBookId][unitNum] : [];

            const combined = [...wordData, ...idiomData];

            if (combined.length < 4) {
                alert("該單元單字／片語資料不存在或不足 4 個！");
                return;
            }
            wordList = combined;
            document.getElementById("mode-screen-subtitle").innerText = `已選：第 ${selectedBookId.replace("b","")} 冊 Unit ${unitNum}（單字50 + 片語10 = 共60題）`;
            switchScreen("mode-screen");
        }

        function setMode(mode) {
            quizMode = mode;
            document.getElementById("quiz-title").innerText = `第 ${selectedBookId.replace("b","")} 冊 Unit ${selectedUnitNum}`;
            startQuiz();
        }

        function startQuiz() {
            wrongRecords = []; 
            let shuffledLesson = [...wordList].sort(() => 0.5 - Math.random());

            quizQuestions = shuffledLesson.map(item => {
                let wrongPool = wordList.filter(w => w.eng !== item.eng);
                let shuffledWrong = wrongPool.sort(() => 0.5 - Math.random());
                
                let options = [];
                let questionText = "";
                let correctAnswer = "";

                if (quizMode === "engToCh") {
                    questionText = item.eng;
                    correctAnswer = item.ch;
                    options = [item.ch, shuffledWrong[0].ch, shuffledWrong[1].ch, shuffledWrong[2].ch];
                } else {
                    let pos = getPosTag(item.ch);
                    questionText = `${pos} ${item.ch}`;
                    correctAnswer = item.eng;
                    options = [item.eng, shuffledWrong[0].eng, shuffledWrong[1].eng, shuffledWrong[2].eng];
                }

                options.sort(() => 0.5 - Math.random());

                return {
                    rawWord: item.eng,
                    rawCh: item.ch,
                    question: questionText,
                    type: quizMode === "engToCh" ? "請選擇正確的中文意思" : "請選擇正確的英文單字",
                    options: options,
                    answer: correctAnswer
                };
            });

            currentIndex = 0;
            correctAnswersCount = 0;
            switchScreen("quiz-screen");
            showQuestion();
        }

        function showQuestion() {
            hasAnswered = false;
            document.getElementById("next-btn").style.display = "none";
            document.getElementById("feedback-text").innerText = "";
            const q = quizQuestions[currentIndex];
            document.getElementById("progress-text").innerText = `${currentIndex + 1} / ${quizQuestions.length}`;
            document.getElementById("quiz-type").innerText = q.type;
            document.getElementById("target-question").innerText = q.question;
            const optionsContainer = document.getElementById("options-container");
            optionsContainer.innerHTML = "";
            q.options.forEach(opt => {
                const btn = document.createElement("button");
                btn.className = "option-btn";
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(opt, btn);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(selectedOpt, clickedBtn) {
            if (hasAnswered) return;
            hasAnswered = true;
            const q = quizQuestions[currentIndex];
            const buttons = document.getElementsByClassName("option-btn");
            if (selectedOpt === q.answer) {
                clickedBtn.classList.add("correct");
                document.getElementById("feedback-text").innerHTML = `<span style="color:var(--success)">💯 答對了</span>`;
                correctAnswersCount++;
            } else {
                clickedBtn.classList.add("wrong");
                for (let btn of buttons) {
                    if (btn.innerText === q.answer) btn.classList.add("correct");
                }
                document.getElementById("feedback-text").innerHTML = `<span style="color:var(--error)">❌ 答案是：${q.answer}</span>`;
                wrongRecords.push({ eng: q.rawWord, ch: q.rawCh, yourAnswer: selectedOpt });
            }
            document.getElementById("next-btn").style.display = "block";
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex < quizQuestions.length) showQuestion();
            else showResult();
        }

        function showResult() {
            switchScreen("result-screen");
            let finalScore = Math.round((correctAnswersCount / quizQuestions.length) * 100);
            document.getElementById("stats-text").innerText = `答對題數：${correctAnswersCount} / ${quizQuestions.length}`;
            document.getElementById("final-score").innerText = finalScore;
            let evalText = finalScore === 100 ? "太完美了！完全征服！🏆" : (finalScore >= 80 ? "非常厲害！快要全熟了！🔥" : (finalScore >= 60 ? "及格囉！繼續加油！👍" : "再接再厲！"));
            document.getElementById("evaluation-text").innerText = evalText;
            const wrongSection = document.getElementById("wrong-answers-section");
            const wrongContainer = document.getElementById("wrong-list-container");
            if (wrongRecords.length > 0) {
                wrongSection.style.display = "block";
                wrongContainer.innerHTML = wrongRecords.map((item, i) => `<div class="wrong-item"><strong>${i + 1}. ${item.eng}</strong> (${item.ch})<br><span style="color:var(--error)">你的答案: ${item.yourAnswer}</span></div>`).join("");
            } else wrongSection.style.display = "none";
        }

        function retryQuiz() { startQuiz(); }
    </script>
</body>
</html>
