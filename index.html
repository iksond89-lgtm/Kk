<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英文單字複習系統</title>

    <script src="word-data.js"></script>

    <style>
        :root {
            --primary: #4a90e2;
            --success: #2ecc71;
            --error: #e74c3c;
            --background: #f5f7fa;
            --card: #ffffff;
            --text: #2c3e50;
        }

        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background: var(--background);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .quiz-container {
            width: 100%;
            max-width: 600px;
            background: var(--card);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }

        .screen { display: none; }
        .screen.active { display: block; }

        h2 { text-align: center; }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        button {
            padding: 14px;
            border-radius: 10px;
            border: 2px solid #ddd;
            background: #f8fafc;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .option.correct { background: #d1fae5; }
        .option.wrong { background: #fee2e2; }
    </style>
</head>

<body>

<div class="quiz-container">

    <!-- 選冊 -->
    <div id="screen-book" class="screen active">
        <h2>選擇冊別</h2>
        <div class="grid">
            <button onclick="selectBook('b1')">Book 1</button>
            <button onclick="selectBook('b2')">Book 2</button>
            <button onclick="selectBook('b3')">Book 3</button>
            <button onclick="selectBook('core')">核心字彙</button>
        </div>
    </div>

    <!-- 選單元 -->
    <div id="screen-unit" class="screen">
        <h2>選擇單元</h2>
        <div class="grid" id="unitBox"></div>
        <button onclick="backTo('screen-book')">返回</button>
    </div>

    <!-- 模式 -->
    <div id="screen-mode" class="screen">
        <h2>選擇模式</h2>
        <button onclick="setMode('enToZh')">英文 → 中文</button>
        <button onclick="setMode('zhToEn')">中文 → 英文</button>
        <button onclick="backTo('screen-unit')">返回</button>
    </div>

    <!-- 測驗 -->
    <div id="screen-quiz" class="screen">
        <h2 id="q-title"></h2>
        <div id="question"></div>
        <div class="grid" id="options"></div>
        <div id="feedback"></div>
        <button onclick="nextQ()">下一題</button>
    </div>

</div>

<script>
let book = "";
let unit = "";
let mode = "";
let list = [];
let questions = [];
let index = 0;
let score = 0;

function switchScreen(id){
    document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

function selectBook(b){
    book = b;
    let box = document.getElementById("unitBox");
    box.innerHTML = "";

    for(let i=1;i<=10;i++){
        let btn = document.createElement("button");
        btn.innerText = "Unit " + i;
        btn.onclick = ()=>selectUnit(i);
        box.appendChild(btn);
    }

    switchScreen("screen-unit");
}

function selectUnit(u){
    unit = u;

    let vocab = WORD_DATA[book]?.[unit] || [];

    list = vocab;

    if(list.length === 0){
        alert("沒有資料");
        return;
    }

    switchScreen("screen-mode");
}

function setMode(m){
    mode = m;
    startQuiz();
}

function startQuiz(){
    index = 0;
    score = 0;

    questions = list.map(item=>{
        let wrong = list.filter(x=>x.eng!==item.eng)
                         .sort(()=>Math.random()-0.5)
                         .slice(0,3);

        let options = mode==="enToZh"
            ? [item.ch, ...wrong.map(x=>x.ch)]
            : [item.eng, ...wrong.map(x=>x.eng)];

        options.sort(()=>Math.random()-0.5);

        return {
            q: mode==="enToZh"?item.eng:item.ch,
            a: mode==="enToZh"?item.ch:item.eng,
            options
        };
    });

    switchScreen("screen-quiz");
    show();
}

function show(){
    let q = questions[index];

    document.getElementById("q-title").innerText =
        `第 ${index+1} 題 / ${questions.length}`;

    document.getElementById("question").innerText = q.q;

    let box = document.getElementById("options");
    box.innerHTML = "";

    q.options.forEach(opt=>{
        let b = document.createElement("button");
        b.className = "option";
        b.innerText = opt;

        b.onclick = ()=>{
            if(opt===q.a){
                b.classList.add("correct");
                score++;
            }else{
                b.classList.add("wrong");
            }
        };

        box.appendChild(b);
    });
}

function nextQ(){
    index++;
    if(index>=questions.length){
        alert("結束 分數:"+score);
        switchScreen("screen-book");
    }else{
        show();
    }
}

function backTo(id){
    switchScreen(id);
}
</script>

</body>
</html>
