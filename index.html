<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高中英文單字多冊複習系統</title>
    <script src="b1-vocab.js"></script>
    <style>
        :root { --primary: #4a90e2; --success: #2ecc71; --error: #e74c3c; --background: #f5f7fa; --card: #ffffff; --text: #2c3e50; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, "Microsoft JhengHei"; background-color: var(--background); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100svh; }
        .quiz-container { background-color: var(--card); border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.05); width: 100%; max-width: 550px; padding: 30px; box-sizing: border-box; }
        .screen { display: none; }
        .screen.active { display: block; }
        h2 { text-align: center; margin-top: 0; color: var(--text); }
        .subtitle { text-align: center; color: #7f8c8d; margin-bottom: 24px; }
        .grid-menu { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
        .menu-btn { background-color: #f8fafc; border: 2px solid #e2e8f0; border-radius: 12px; padding: 16px; font-size: 16px; font-weight: bold; color: var(--text); cursor: pointer; transition: all 0.2s ease; text-align: center; }
        .menu-btn:hover { border-color: var(--primary); background-color: #ebf8ff; color: var(--primary); transform: translateY(-2px); }
        .btn-back { grid-column: span 2; background-color: #7f8c8d; color: white; border: none; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; border-bottom: 2px solid #edf2f7; padding-bottom: 12px; }
        .title { font-size: 16px; font-weight: bold; color: var(--primary); }
        .progress { font-size: 14px; color: #7f8c8d; background: #e2e8f0; padding: 4px 10px; border-radius: 20px; }
        .word-box { text-align: center; margin: 30px 0; }
        .quiz-type-tag { display: inline-block; font-size: 12px; background-color: #ebf8ff; color: #2b6cb0; padding: 4px 12px; border-radius: 12px; margin-bottom: 12px; font-weight: bold; }
        .word { font-size: 32px; font-weight: 700; color: #1a202c; word-break: break-word; }
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-bottom: 24px; }
        .option-btn { background-color: #f8fafc; border: 2px solid #e2e8f0; border-radius: 10px; padding: 14px 20px; font-size: 16px; text-align: left; cursor: pointer; color: var(--text); }
        .option-btn.correct { background-color: #def7ec; border-color: #2ecc71; color: #03543f; font-weight: bold; }
        .option-btn.wrong { background-color: #fde8e8; border-color: #e74c3c; color: #9b1c1c; }
        .feedback { min-height: 40px; text-align: center; font-size: 16px; font-weight: 500; margin-bottom: 20px; }
        .next-btn { width: 100%; background-color: var(--primary); color: white; border: none; border-radius: 10px; padding: 14px; font-size: 16px; font-weight: bold; cursor: pointer; display: none; }
        .score-big { font-size: 64px; font-weight: 800; color: var(--primary); margin: 20px 0; text-align: center; }
        .btn-group { display: flex; gap: 10px; margin-top: 24px; flex-wrap: wrap; }
        .btn-group button { flex: 1; min-width: 120px; padding: 14px; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; border: none; }
        .btn-retry { background-color: #edf2f7; color: var(--text); }
        .btn-home { background-color: var(--text); color: white; }
    </style>
</head>
<body>

    <div class="quiz-container">
        <div id="book-screen" class="screen active">
            <h2>請選擇要複習的</h2>
            <div class="subtitle">💦💦💦💦💦💦💦💦💦</div>
            <div class="grid-menu" id="main-menu-grid"></div>
        </div>

        <div id="unit-screen" class="screen">
            <h2>🔍 選擇單元</h2>
            <div class="subtitle" id="unit-screen-subtitle"></div>
            <div class="grid-menu" id="unit-grid"></div>
        </div>

        <div id="mode-screen" class="screen">
            <h2>⚙️ 選擇測驗模式</h2>
            <div class="subtitle" id="mode-screen-subtitle"></div>
            <div class="grid-menu" style="grid-template-columns: 1fr;">
                <button class="menu-btn" onclick="setMode('engToCh')">英翻中</button>
                <button class="menu-btn" onclick="setMode('chToEng')">中翻英</button>
                <button class="menu-btn btn-back" onclick="switchScreen('unit-screen')">⬅ 回到選單元</button>
            </div>
        </div>

        <div id="quiz-screen" class="screen">
            <div class="header">
                <div class="title" id="quiz-title">單字大挑戰</div>
                <div class="progress" id="progress-text">1 / --</div>
            </div>
            <div class="word-box">
                <div class="quiz-type-tag" id="quiz-type">題型</div>
                <div class="word" id="target-question">loading...</div>
            </div>
            <div class="options-grid" id="options-container"></div>
            <div class="feedback" id="feedback-text"></div>
            <button class="next-btn" id="next-btn" onclick="nextQuestion()">下一題 ➔</button>
        </div>

        <div id="result-screen" class="screen" style="text-align: center;">
            <h2>測驗結束</h2>
            <div class="score-big" id="final-score">0</div>
            <p id="stats-text"></p>
            <div class="btn-group">
                <button class="btn-retry" onclick="retryQuiz()">再測一次</button>
                <button class="btn-home" onclick="switchScreen('book-screen')">回首頁</button>
            </div>
        </div>
    </div>

    <script>
        // 設定選單：未來想增刪冊數，直接修改這裡即可，CSS 美編完全不受影響
        const BOOKS_CONFIG = [
            { label: "簡宜學測複習", id: "b1" },
            { label: "核心字彙", id: "core" }
        ];

        function initMenu() {
            const grid = document.getElementById("main-menu-grid");
            BOOKS_CONFIG.forEach(item => {
                const btn = document.createElement("button");
                btn.className = "menu-btn";
                btn.innerText = item.label;
                btn.onclick = () => selectBook(item.id);
                grid.appendChild(btn);
            });
        }
        window.onload = initMenu;

        // --- 以下為原有的邏輯 ---
        let selectedBookId = "", selectedUnitNum = 0, quizMode = "engToCh", wordList = [], quizQuestions = [], currentIndex = 0, correctAnswersCount = 0, hasAnswered = false;

        function switchScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function selectBook(bookId) {
            selectedBookId = bookId;
            const unitGrid = document.getElementById("unit-grid");
            unitGrid.innerHTML = "";
            document.getElementById("unit-screen-subtitle").innerText = (bookId === 'core') ? "請選擇難度" : "請選擇單元";
            
            if (bookId === 'core') {
                ['Basic', 'Advance'].forEach(v => addUnitBtn(v, v.toLowerCase()));
            } else {
                for(let i=1; i<=10; i++) addUnitBtn(`Unit ${i}`, i);
            }
            
            const backBtn = document.createElement("button");
            backBtn.className = "menu-btn btn-back";
            backBtn.innerText = "⬅ 回到選冊";
            backBtn.onclick = () => switchScreen('book-screen');
            unitGrid.appendChild(backBtn);
            switchScreen("unit-screen");
        }

        function addUnitBtn(label, val) {
            const btn = document.createElement("button");
            btn.className = "menu-btn";
            btn.innerText = label;
            btn.onclick = () => { selectedUnitNum = val; switchScreen("mode-screen"); document.getElementById("mode-screen-subtitle").innerText = `已選：${selectedBookId} ${selectedUnitNum}`; };
            document.getElementById("unit-grid").appendChild(btn);
        }

        function setMode(mode) {
            quizMode = mode;
            wordList = WORD_DATA[selectedBookId][selectedUnitNum] || [];
            let shuffledLesson = [...wordList].sort(() => 0.5 - Math.random());
            quizQuestions = shuffledLesson.map(item => {
                let wrongPool = wordList.filter(w => w.eng !== item.eng);
                let options = [item[quizMode==="engToCh"?"ch":"eng"]];
                for(let i=0; i<3; i++) options.push(wrongPool[Math.floor(Math.random()*wrongPool.length)][quizMode==="engToCh"?"ch":"eng"]);
                return { question: (quizMode==="engToCh" ? item.eng : item.ch), options: options.sort(() => 0.5 - Math.random()), answer: (quizMode==="engToCh" ? item.ch : item.eng) };
            });
            currentIndex = 0; correctAnswersCount = 0; switchScreen("quiz-screen"); showQuestion();
        }

        function showQuestion() {
            hasAnswered = false; document.getElementById("next-btn").style.display = "none";
            const q = quizQuestions[currentIndex];
            document.getElementById("progress-text").innerText = `${currentIndex + 1} / ${quizQuestions.length}`;
            document.getElementById("target-question").innerText = q.question;
            const container = document.getElementById("options-container");
            container.innerHTML = "";
            q.options.forEach(opt => {
                const btn = document.createElement("button");
                btn.className = "option-btn"; btn.innerText = opt;
                btn.onclick = () => {
                    if(hasAnswered) return; hasAnswered = true;
                    if(opt === q.answer) { btn.classList.add("correct"); correctAnswersCount++; }
                    else { btn.classList.add("wrong"); Array.from(container.children).find(b=>b.innerText===q.answer).classList.add("correct"); }
                    document.getElementById("next-btn").style.display = "block";
                };
                container.appendChild(btn);
            });
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex < quizQuestions.length) showQuestion();
            else { switchScreen("result-screen"); document.getElementById("final-score").innerText = Math.round((correctAnswersCount / quizQuestions.length) * 100); document.getElementById("stats-text").innerText = `答對題數：${correctAnswersCount} / ${quizQuestions.length}`; }
        }

        function retryQuiz() { currentIndex = 0; correctAnswersCount = 0; showQuestion(); switchScreen("quiz-screen"); }
    </script>
</body>
</html>
