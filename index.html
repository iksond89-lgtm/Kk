<script>
const WORD_DATA = {
  "b1": {
    "1": [
      { "eng": "abandon", "ch": "拋棄；捨棄；放棄" },
      { "eng": "advantage", "ch": "優勢；益處" },
      { "eng": "amaze", "ch": "使吃驚" },
      { "eng": "assign", "ch": "分配；任命；指定" }
    ],
    "2": [
      { "eng": "adventure", "ch": "冒險；冒險經歷" },
      { "eng": "appliance", "ch": "器具；電器" },
      { "eng": "assist", "ch": "幫助" },
      { "eng": "bare", "ch": "裸露的" }
    ]
  }
};

const BOOKS_CONFIG = [{ label: "簡宜學測複習", id: "b1" }];

const grid = document.getElementById("main-menu-grid");

BOOKS_CONFIG.forEach(item => {
  const btn = document.createElement("button");
  btn.className = "menu-btn";
  btn.innerText = item.label;
  btn.onclick = () => selectBook(item.id);
  grid.appendChild(btn);
});

let selectedBookId, quizQuestions = [], currentIndex = 0;

function selectBook(id) {
  selectedBookId = id;

  const unitGrid = document.getElementById("unit-grid");
  unitGrid.innerHTML = "";

  Object.keys(WORD_DATA[id]).forEach(unit => {
    const btn = document.createElement("button");
    btn.className = "menu-btn";
    btn.innerText = "Unit " + unit;
    btn.onclick = () => startQuiz(unit);
    unitGrid.appendChild(btn);
  });

  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('unit-screen').classList.add('active');
}

function startQuiz(unit) {
  const data = WORD_DATA[selectedBookId]?.[unit];

  if (!data || data.length === 0) {
    alert("這個單元還沒有資料");
    return;
  }

  quizQuestions = [...data].sort(() => Math.random() - 0.5);
  currentIndex = 0;

  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('quiz-screen').classList.add('active');

  showQuestion();
}

function showQuestion() {
  const q = quizQuestions[currentIndex];

  document.getElementById('target-question').innerText = q.eng;

  const cont = document.getElementById('options-container');
  cont.innerHTML = "";

  const pool = quizQuestions
    .map(x => x.ch)
    .filter(x => x !== q.ch);

  const wrongs = [...new Set(pool)]
    .sort(() => Math.random() - 0.5)
    .slice(0, 3);

  q.options = [q.ch, ...wrongs].sort(() => Math.random() - 0.5);

  q.options.forEach(opt => {
    const btn = document.createElement("button");
    btn.className = "option-btn";
    btn.innerText = opt;

    btn.onclick = () => {
      const buttons = cont.querySelectorAll("button");

      buttons.forEach(b => {
        b.disabled = true;

        if (b.innerText === q.ch) {
          b.classList.add("correct");
        } else if (b === btn) {
          b.classList.add("wrong");
        }
      });

      document.getElementById('next-btn').style.display = "block";
    };

    cont.appendChild(btn);
  });

  document.getElementById('next-btn').style.display = "none";
}

function nextQuestion() {
  currentIndex++;

  if (currentIndex < quizQuestions.length) {
    showQuestion();
  } else {
    alert("結束！");
  }
}
</script>
