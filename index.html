<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>英文單字複習系統</title>
    </head>
<body>
<div class="container">
    <header><h1>📚 英文單字複習</h1></header>

    <div id="book-select-screen" class="menu">
        <h2>請選擇冊數</h2>
        <div id="book-grid" class="unit-grid">
            <button onclick="selectBook(1)">第一冊</button>
            <button onclick="selectBook(2)">第二冊</button>
            <button onclick="selectBook(3)">第三冊</button>
            <button onclick="selectBook(4)">第四冊</button>
        </div>
    </div>

    <div id="unit-select-screen" class="menu" style="display:none;">
        <button onclick="showScreen('book-select-screen')">← 返回冊數</button>
        <h2 id="book-title"></h2>
        <div id="unit-grid" class="unit-grid"></div>
    </div>

    <div id="unit-menu-screen" class="menu" style="display:none;">
        <button onclick="showScreen('unit-select-screen')">← 返回單元列表</button>
        <h2 id="current-unit-title"></h2>
        <button onclick="startReview()">📇 複習模式</button>
        <button onclick="startQuiz('eng-to-ch')">🧪 英翻中</button>
        <button onclick="startQuiz('ch-to-eng')">🧪 中翻英</button>
    </div>

    <div id="study-screen" style="display:none; padding:20px;">
        <button onclick="exitStudy()">← 結束並返回</button>
        <div id="card" class="card" onclick="flipCard()"></div>
        <div id="stats"></div>
        <div id="quiz-area" style="display:none;"></div>
    </div>
</div>

<script type="module">
import { vocabulary } from './vocab.js';

let currentBook, currentUnit, currentMode, quizType, currentIndex = 0;
let currentWords = [];

// 畫面切換輔助
window.showScreen = (id) => {
    ['book-select-screen', 'unit-select-screen', 'unit-menu-screen', 'study-screen']
        .forEach(s => document.getElementById(s).style.display = (s === id ? 'block' : 'none'));
};

// 選擇冊數
window.selectBook = (book) => {
    currentBook = book;
    document.getElementById('book-title').textContent = `第 ${book} 冊`;
    const units = [...new Set(vocabulary.filter(w => w.book === book).map(w => w.unit))];
    
    let html = '';
    units.forEach(u => {
        const count = vocabulary.filter(w => w.book === book && w.unit === u).length;
        html += `<button onclick="selectUnit(${u})">Unit ${u}<br>(${count}字)</button>`;
    });
    document.getElementById('unit-grid').innerHTML = html;
    showScreen('unit-select-screen');
};

// 選擇單元
window.selectUnit = (unit) => {
    currentUnit = unit;
    currentWords = vocabulary.filter(w => w.book === currentBook && w.unit === unit);
    document.getElementById('current-unit-title').textContent = `第 ${currentBook} 冊 - Unit ${unit}`;
    showScreen('unit-menu-screen');
};

// 閃卡與測驗邏輯維持你原本的實作方式即可
// (記得將原 script 中的函式掛載到 window 下，確保按鈕點擊時找得到函式)

window.exitStudy = () => showScreen('unit-menu-screen');
</script>
</body>
</html>
