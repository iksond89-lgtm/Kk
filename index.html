<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高中英文單字總複習系統</title>
    <style>
        :root {
            --primary: #4a90e2;
            --success: #2ecc71;
            --error: #e74c3c;
            --background: #f5f7fa;
            --card: #ffffff;
            --text: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, "Microsoft JhengHei";
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-container {
            background-color: var(--card);
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 550px;
            padding: 30px;
            box-sizing: border-box;
        }

        /* 畫面切換控制 */
        .screen {
            display: none;
        }
        .screen.active {
            display: block;
        }

        h2 {
            text-align: center;
            margin-top: 0;
            color: var(--text);
        }

        .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 24px;
        }

        /* 首頁選單網格 */
        .unit-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            margin-bottom: 10px;
        }

        .unit-btn {
            background-color: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 16px;
            font-size: 16px;
            font-weight: bold;
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .unit-btn:hover {
            border-color: var(--primary);
            background-color: #ebf8ff;
            color: var(--primary);
            transform: translateY(-2px);
        }

        /* 測驗畫面樣式 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            border-bottom: 2px solid #edf2f7;
            padding-bottom: 12px;
        }

        .title {
            font-size: 16px;
            font-weight: bold;
            color: var(--primary);
        }

        .progress {
            font-size: 14px;
            color: #7f8c8d;
            background: #e2e8f0;
            padding: 4px 10px;
            border-radius: 20px;
        }

        .word-box {
            text-align: center;
            margin: 30px 0;
        }

        .quiz-type-tag {
            display: inline-block;
            font-size: 12px;
            background-color: #ebf8ff;
            color: #2b6cb0;
            padding: 4px 12px;
            border-radius: 12px;
            margin-bottom: 12px;
            font-weight: bold;
        }

        .word {
            font-size: 34px;
            font-weight: 700;
            color: #1a202c;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }

        .option-btn {
            background-color: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            padding: 14px 20px;
            font-size: 16px;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text);
        }

        .option-btn:hover {
            background-color: #edf2f7;
            border-color: #cbd5e0;
        }

        .option-btn.correct {
            background-color: #def7ec;
            border-color: var(--success);
            color: #03543f;
            font-weight: bold;
        }

        .option-btn.wrong {
            background-color: #fde8e8;
            border-color: var(--error);
            color: #9b1c1c;
        }

        .feedback {
            min-height: 40px;
            text-align: center;
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 20px;
        }

        .next-btn, .nav-btn {
            width: 100%;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(74, 144, 226, 0.3);
        }

        .next-btn {
            display: none;
        }

        /* 結算畫面樣式 */
        .result-screen {
            text-align: center;
        }

        .score-big {
            font-size: 64px;
            font-weight: 800;
            color: var(--primary);
            margin: 20px 0;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 24px;
        }

        .btn-group button {
            flex: 1;
            padding: 14px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border: none;
        }

        .btn-retry {
            background-color: #edf2f7;
            color: var(--text);
        }

        .btn-home {
            background-color: var(--text);
            color: white;
        }
    </style>
</head>
<body>

    <div class="quiz-container">
        
        <div id="home-screen" class="screen active">
            <h2>⚡ 英文單字總複習 ⚡</h2>
            <div class="subtitle">請選擇要挑戰的 Unit 開始測驗</div>
            <div class="unit-grid">
                <button class="unit-btn" onclick="selectUnit('unit01')">Unit 01</button>
                <button class="unit-btn" onclick="selectUnit('unit02')">Unit 02</button>
                <button class="unit-btn" onclick="selectUnit('unit03')">Unit 03</button>
                <button class="unit-btn" onclick="selectUnit('unit04')">Unit 04</button>
                <button class="unit-btn" onclick="selectUnit('unit05')">Unit 05</button>
                <button class="unit-btn" onclick="selectUnit('unit06')">Unit 06</button>
                <button class="unit-btn" onclick="selectUnit('unit07')">Unit 07</button>
                <button class="unit-btn" onclick="selectUnit('unit08')">Unit 08</button>
                <button class="unit-btn" onclick="selectUnit('unit09')">Unit 09</button>
                <button class="unit-btn" onclick="selectUnit('unit10')">Unit 10</button>
            </div>
        </div>

        <div id="quiz-screen" class="screen">
            <div class="header">
                <div class="title" id="quiz-title">UNIT 01 挑戰中</div>
                <div class="progress" id="progress-text">1 / --</div>
            </div>

            <div class="word-box">
                <div class="quiz-type-tag" id="quiz-type">題型</div>
                <div class="word" id="target-question">loading...</div>
            </div>

            <div class="options-grid" id="options-container"></div>

            <div class="feedback" id="feedback-text"></div>
            <button class="next-btn" id="next-btn" onclick="nextQuestion()">下一題 ➔</button>
        </div>

        <div id="result-screen" class="screen result-screen">
            <h2>🎉 測驗完成！</h2>
            <p id="stats-text">答對題數：0 / 0</p>
            <p>你的得分是</p>
            <div class="score-big" id="final-score">0</div>
            <p id="evaluation-text"></p>
            
            <div class="btn-group">
                <button class="btn-retry" onclick="restartCurrentUnit()">再測一次</button>
                <button class="btn-home" onclick="goHome()">回首頁 🏠</button>
            </div>
        </div>

    </div>

    <script>
        // ========================================================
        //  📖 這裡管理 10 個 Unit 的單字資料庫
        //  💡 之後有新的一課，直接貼進對應單元的中括號 [] 裡面即可！
        // ========================================================
        const allUnitsData = {
            unit01: [
                { eng: "bankrupt", ch: "破產的" },
                { eng: "billion", ch: "十億" },
                { eng: "boast", ch: "自誇" },
                { eng: "complicate", ch: "使複雜" },
                { eng: "converse", ch: "交談" },
                { eng: "dispute", ch: "爭論；辯論" },
                { eng: "earnest", ch: "誠摯的；認真的" },
                { eng: "fragrance", ch: "芳香；香氣" },
                { eng: "guilty", ch: "有罪的；內疚的" },
                { eng: "laboratory", ch: "實驗室" },
                { eng: "leather", ch: "皮革" },
                { eng: "lung", ch: "肺" },
                { eng: "pause", ch: "停頓；暫停" },
                { eng: "portion", ch: "一部分；一份" },
                { eng: "procedure", ch: "手續；程序" },
                { eng: "suburb", ch: "郊區" },
                { eng: "evidence", ch: "證據" },
                { eng: "catch up", ch: "趕上" },
                { eng: "keep up", ch: "保持；(使)不停止" }
            ],
            unit02: [
                // 💡 範例格式： { eng: "apple", ch: "蘋果" }
            ],
            unit03: [],
            unit04: [],
            unit05: [],
            unit06: [],
            unit07: [],
            unit08: [],
            unit09: [],
            unit10: []
        };

        let currentActiveUnit = "";
        let quizQuestions = [];
        let currentIndex = 0;
        let correctAnswersCount = 0;
        let hasAnswered = false;

        // 切換畫面的函式
        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        // 首頁點擊 Unit
        function selectUnit(unitKey) {
            const wordList = allUnitsData[unitKey];
            
            // 檢查該單元有沒有放單字
            if (!wordList || wordList.length < 4) {
                alert("這個 Unit 目前還沒有輸入足夠的單字喔！（至少需放4個單字當作干擾選項）");
                return;
            }

            currentActiveUnit = unitKey;
            
            // 更新網頁標題顯示
            const unitNumber = unitKey.replace("unit", "");
            document.getElementById("quiz-title").innerText = `UNIT ${unitNumber} 大挑戰`;
            
            startQuiz(wordList);
        }

        // 開始測驗核心邏輯
        function startQuiz(wordList) {
            // 1. 打亂該單元所有單字的順序（一次全部考完）
            let shuffledLesson = [...wordList].sort(() => 0.5 - Math.random());

            // 2. 建立所有題目，隨機決定「考英文」還是「考中文」
            quizQuestions = shuffledLesson.map(item => {
                const isEngToCh = Math.random() > 0.5;
                
                // 從當前單元中抓取錯誤選項
                let wrongPool = wordList.filter(w => w.eng !== item.eng);
                let shuffledWrong = wrongPool.sort(() => 0.5 - Math.random());
                
                let options = [];
                let correctAnswer = "";

                if (isEngToCh) {
                    correctAnswer = item.ch;
                    options = [item.ch, shuffledWrong[0].ch, shuffledWrong[1].ch, shuffledWrong[2].ch];
                } else {
                    correctAnswer = item.eng;
                    options = [item.eng, shuffledWrong[0].eng, shuffledWrong[1].eng, shuffledWrong[2].eng];
                }

                // 打亂選項順序
                options.sort(() => 0.5 - Math.random());

                return {
                    question: isEngToCh ? item.eng : item.ch,
                    type: isEngToCh ? "請選擇正確的中文意思" : "請選擇正確的英文單字",
                    options: options,
                    answer: correctAnswer
                };
            });

            currentIndex = 0;
            correctAnswersCount = 0;
            switchScreen("quiz-screen");
            showQuestion();
        }

        // 顯示單一題目
        function showQuestion() {
            hasAnswered = false;
            document.getElementById("next-btn").style.display = "none";
            document.getElementById("feedback-text").innerText = "";
            
            const q = quizQuestions[currentIndex];
            document.getElementById("progress-text").innerText = `${currentIndex + 1} / ${quizQuestions.length}`;
            document.getElementById("quiz-type").innerText = q.type;
            document.getElementById("target-question").innerText = q.question;

            const optionsContainer = document.getElementById("options-container");
            optionsContainer.innerHTML = "";

            q.options.forEach(opt => {
                const btn = document.createElement("button");
                btn.className = "option-btn";
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(opt, btn);
                optionsContainer.appendChild(btn);
            });
        }

        // 檢查答案
        function checkAnswer(selectedOpt, clickedBtn) {
            if (hasAnswered) return;
            hasAnswered = true;

            const q = quizQuestions[currentIndex];
            const buttons = document.getElementsByClassName("option-btn");

            if (selectedOpt === q.answer) {
                clickedBtn.classList.add("correct");
                document.getElementById("feedback-text").innerHTML = `<span style="color:var(--success)">💯 太棒了！答對了</span>`;
                correctAnswersCount++;
            } else {
                clickedBtn.classList.add("wrong");
                for (let btn of buttons) {
                    if (btn.innerText === q.answer) {
                        btn.classList.add("correct");
                    }
                }
                document.getElementById("feedback-text").innerHTML = `<span style="color:var(--error)">❌ 答錯囉！答案是：${q.answer}</span>`;
            }

            document.getElementById("next-btn").style.display = "block";
        }

        // 下一題
        function nextQuestion() {
            currentIndex++;
            if (currentIndex < quizQuestions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        // 顯示結果結算
        function showResult() {
            switchScreen("result-screen");
            
            let finalScore = Math.round((correctAnswersCount / quizQuestions.length) * 100);
            
            document.getElementById("stats-text").innerText = `答對題數：${correctAnswersCount} / ${quizQuestions.length}`;
            document.getElementById("final-score").innerText = finalScore;

            let evalText = "";
            if (finalScore === 100) evalText = "太完美了！這個單元你已經完全征服！🏆";
            else if (finalScore >= 80) evalText = "非常厲害！快要全熟了，再接再厲！🔥";
            else if (finalScore >= 60) evalText = "及格囉！把記錯的再複習一下！👍";
            else evalText = "還不夠熟練喔，多挑戰幾次一定行！💪";
            
            document.getElementById("evaluation-text").innerText = evalText;
        }

        // 功能按鈕：再測一次
        function restartCurrentUnit() {
            if (currentActiveUnit) {
                startQuiz(allUnitsData[currentActiveUnit]);
            }
        }

        // 功能按鈕：回首頁
        function goHome() {
            switchScreen("home-screen");
        }
    </script>
</body>
</html>
