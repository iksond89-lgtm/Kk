<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高中英文單字多冊複習系統 v2</title>
    <script src="b1-vocab.js"></script>
    <script src="b1-idiom.js"></script>
    <script src="core-data.js"></script>
    <style>
        :root { --primary: #4a90e2; --success: #2ecc71; --error: #e74c3c; --background: #f5f7fa; --card: #ffffff; --text: #2c3e50; }
        body { font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif; background-color: var(--background); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .quiz-container { background-color: var(--card); border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.05); width: 100%; max-width: 550px; padding: 30px; box-sizing: border-box; }
        .screen { display: none; } .screen.active { display: block; }
        h2 { text-align: center; margin-top: 0; color: var(--text); }
        .subtitle { text-align: center; color: #7f8c8d; margin-bottom: 24px; }
        .grid-menu { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
        .menu-btn { background-color: #f8fafc; border: 2px solid #e2e8f0; border-radius: 12px; padding: 16px; font-size: 16px; font-weight: bold; cursor: pointer; text-align: center; transition: all 0.2s; }
        .menu-btn:hover { border-color: var(--primary); background-color: #ebf8ff; color: var(--primary); transform: translateY(-2px); }
        .btn-back { grid-column: span 2; background-color: #7f8c8d; color: white; border: none; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; border-bottom: 2px solid #edf2f7; padding-bottom: 12px; }
        .title { font-size: 16px; font-weight: bold; color: var(--primary); }
        .progress { font-size: 14px; color: #7f8c8d; background: #e2e8f0; padding: 4px 10px; border-radius: 20px; }
        .word-box { text-align: center; margin: 30px 0; }
        .quiz-type-tag { display: inline-block; font-size: 12px; background-color: #ebf8ff; color: #2b6cb0; padding: 4px 12px; border-radius: 12px; margin-bottom: 12px; font-weight: bold; }
        .word { font-size: 32px; font-weight: 700; color: #1a202c; }
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-bottom: 24px; }
        .option-btn { background-color: #f8fafc; border: 2px solid #e2e8f0; border-radius: 10px; padding: 14px 20px; font-size: 16px; text-align: left; cursor: pointer; }
        .option-btn.correct { background-color: #def7ec; border-color: #2ecc71; color: #03543f; font-weight: bold; }
        .option-btn.wrong { background-color: #fde8e8; border-color: #e74c3c; color: #9b1c1c; }
        .feedback { min-height: 40px; text-align: center; font-weight: 500; margin-bottom: 20px; }
        .next-btn { width: 100%; background-color: var(--primary); color: white; border: none; border-radius: 10px; padding: 14px; font-weight: bold; cursor: pointer; display: none; }
        .score-big { font-size: 64px; font-weight: 800; color: var(--primary); margin: 20px 0; text-align: center; }
        .wrong-list { text-align: left; background: #fff5f5; border: 1px solid #fed7d7; border-radius: 10px; padding: 15px; margin-top: 20px; max-height: 250px; overflow-y: auto; }
    </style>
</head>
<body>
    <div class="quiz-container">
        <div id="book-screen" class="screen active">
            <h2>請選擇要複習的</h2>
            <div class="grid-menu">
                <button class="menu-btn" onclick="selectBook('b1')">簡宜學測複習</button>
                <button class="menu-btn" onclick="selectBook('core')">核心字彙</button>
                <button class="menu-btn" onclick="selectBook('b3')">第三冊</button>
                <button class="menu-btn" onclick="selectBook('b4')">第四冊</button>
            </div>
        </div>
        <div id="unit-screen" class="screen">
            <h2 id="unit-title">選擇單元</h2>
            <div class="subtitle" id="unit-screen-subtitle">請選擇</div>
            <div class="grid-menu" id="unit-grid"></div>
        </div>
        <div id="mode-screen" class="screen">
            <h2>⚙️ 測驗模式</h2>
            <div class="subtitle" id="mode-screen-subtitle"></div>
            <div class="grid-menu" style="grid-template-columns: 1fr;">
                <button class="menu-btn" onclick="setMode('engToCh')">英翻中</button>
                <button class="menu-btn" onclick="setMode('chToEng')">中翻英</button>
                <button class="menu-btn btn-back" onclick="switchScreen('book-screen')">⬅ 回首頁</button>
            </div>
        </div>
        <div id="quiz-screen" class="screen">
            <div class="header"><div class="title" id="quiz-title"></div><div class="progress" id="progress-text"></div></div>
            <div class="word-box"><div class="quiz-type-tag" id="quiz-type"></div><div class="word" id="target-question"></div></div>
            <div class="options-grid" id="options-container"></div>
            <div class="feedback" id="feedback-text"></div>
            <button class="next-btn" id="next-btn" onclick="nextQuestion()">下一題 ➔</button>
        </div>
        <div id="result-screen" class="screen" style="text-align: center;">
            <h2>測驗結束</h2>
            <div class="score-big" id="final-score">0</div>
            <p id="evaluation-text"></p>
            <div class="wrong-list" id="wrong-list-container" style="display:none;"></div>
            <button class="menu-btn" style="width:100%; margin-top:20px;" onclick="location.reload()">回首頁</button>
        </div>
    </div>

    <script>
        let selectedBookId, selectedUnitNum, quizMode, wordList, quizQuestions, currentIndex, correctCount, wrongRecords;

        function switchScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

        function selectBook(bookId) {
            selectedBookId = bookId;
            const grid = document.getElementById("unit-grid"); grid.innerHTML = "";
            if (bookId === 'core') {
                document.getElementById("unit-screen-subtitle").innerText = "核心字彙：請選擇難度";
                ["Basic", "Advance"].forEach(d => {
                    const b = document.createElement("button"); b.className = "menu-btn"; b.innerText = d;
                    b.onclick = () => selectDifficulty(d.toLowerCase()); grid.appendChild(b);
                });
            } else {
                document.getElementById("unit-screen-subtitle").innerText = "請選擇單元";
                for(let i=1; i<=10; i++) addUnitBtn(`Unit ${i}`, i);
            }
            const b = document.createElement("button"); b.className = "menu-btn btn-back"; b.innerText = "⬅ 回到選冊"; b.onclick = () => switchScreen('book-screen'); grid.appendChild(b);
            switchScreen("unit-screen");
        }

        function selectDifficulty(diff) {
            selectedBookId = `core_${diff}`;
            const grid = document.getElementById("unit-grid"); grid.innerHTML = "";
            document.getElementById("unit-screen-subtitle").innerText = `${diff.toUpperCase()}：請選擇單元`;
            for(let i=1; i<=18; i++) addUnitBtn(`Unit ${i}`, i);
            const b = document.createElement("button"); b.className = "menu-btn btn-back"; b.innerText = "⬅ 回到選難度"; b.onclick = () => selectBook('core'); grid.appendChild(b);
        }

        function addUnitBtn(label, val) { const b = document.createElement("button"); b.className = "menu-btn"; b.innerText = label; b.onclick = () => selectUnit(val); document.getElementById("unit-grid").appendChild(b); }

        function selectUnit(unitNum) {
            selectedUnitNum = unitNum;
            let w = [], i = [];
            if(selectedBookId.startsWith('core_')) {
                const diff = selectedBookId.split('_')[1];
                w = (WORD_DATA.core && WORD_DATA.core[diff]) ? WORD_DATA.core[diff][unitNum] : [];
                i = (IDIOM_DATA.core && IDIOM_DATA.core[diff]) ? IDIOM_DATA.core[diff][unitNum] : [];
            } else {
                w = (WORD_DATA[selectedBookId]) ? WORD_DATA[selectedBookId][unitNum] : [];
                i = (IDIOM_DATA[selectedBookId]) ? IDIOM_DATA[selectedBookId][unitNum] : [];
            }
            wordList = [...(w||[]), ...(i||[])];
            if(wordList.length === 0) { alert("該單元是空的，是在寫什麼鬼？"); return; }
            document.getElementById("mode-screen-subtitle").innerText = `共 ${wordList.length} 題`;
            switchScreen("mode-screen");
        }

        function setMode(m) { quizMode = m; startQuiz(); }

        function startQuiz() {
            wrongRecords = []; correctCount = 0; currentIndex = 0;
            quizQuestions = wordList.map(item => {
                let pool = wordList.filter(w => w.eng !== item.eng);
                let opts = [quizMode === 'engToCh' ? item.ch : item.eng];
                for(let j=0; j<3; j++) opts.push(quizMode === 'engToCh' ? pool[j].ch : pool[j].eng);
                return { q: quizMode === 'engToCh' ? item.eng : item.ch, a: quizMode === 'engToCh' ? item.ch : item.eng, opts: opts.sort(() => Math.random()-0.5), raw: item };
            }).sort(() => Math.random()-0.5);
            switchScreen("quiz-screen"); showQuestion();
        }

        function showQuestion() {
            document.getElementById("next-btn").style.display = "none";
            document.getElementById("feedback-text").innerText = "";
            const q = quizQuestions[currentIndex];
            document.getElementById("progress-text").innerText = `${currentIndex+1} / ${quizQuestions.length}`;
            document.getElementById("target-question").innerText = q.q;
            const cont = document.getElementById("options-container"); cont.innerHTML = "";
            q.opts.forEach(o => {
                const b = document.createElement("button"); b.className = "option-btn"; b.innerText = o;
                b.onclick = () => {
                    if(document.querySelector('.option-btn.correct')) return;
                    if(o === q.a) { b.classList.add('correct'); correctCount++; document.getElementById("feedback-text").innerHTML = "哇操答對了"; } 
                    else { b.classList.add('wrong'); Array.from(document.querySelectorAll('.option-btn')).find(btn => btn.innerText === q.a).classList.add('correct'); document.getElementById("feedback-text").innerHTML = "打錯了傻逼❌ 答案是："+q.a; wrongRecords.push(q.raw); }
                    document.getElementById("next-btn").style.display = "block";
                };
                cont.appendChild(b);
            });
        }

        function nextQuestion() {
            currentIndex++;
            if(currentIndex < quizQuestions.length) showQuestion();
            else {
                switchScreen("result-screen");
                document.getElementById("final-score").innerText = Math.round(correctCount/quizQuestions.length*100);
                const w = document.getElementById("wrong-list-container");
                if(wrongRecords.length > 0) { w.style.display = "block"; w.innerHTML = "<strong>本次錯題：</strong><br>"+wrongRecords.map(r => r.eng+"("+r.ch+")").join("<br>"); }
            }
        }
    </script>
</body>
</html>
