<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高中英文單字多冊複習系統 v2</title>
    <style>
        :root { --primary: #4a90e2; --success: #2ecc71; --error: #e74c3c; --background: #f5f7fa; --card: #ffffff; --text: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif, "Microsoft JhengHei"; background-color: var(--background); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .quiz-container { background-color: var(--card); border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.05); width: 100%; max-width: 550px; padding: 30px; box-sizing: border-box; }
        .screen { display: none; } .screen.active { display: block; }
        h2 { text-align: center; margin-top: 0; color: var(--text); }
        .subtitle { text-align: center; color: #7f8c8d; margin-bottom: 24px; }
        .grid-menu { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
        .menu-btn { background-color: #f8fafc; border: 2px solid #e2e8f0; border-radius: 12px; padding: 16px; font-size: 16px; font-weight: bold; color: var(--text); cursor: pointer; transition: all 0.2s ease; text-align: center; }
        .menu-btn:hover { border-color: var(--primary); background-color: #ebf8ff; color: var(--primary); }
        .btn-back { grid-column: span 2; background-color: #7f8c8d; color: white; border: none; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; border-bottom: 2px solid #edf2f7; padding-bottom: 12px; }
        .word-box { text-align: center; margin: 30px 0; }
        .word { font-size: 32px; font-weight: 700; color: #1a202c; word-break: break-word; }
        .option-btn { background-color: #f8fafc; border: 2px solid #e2e8f0; border-radius: 10px; padding: 14px 20px; font-size: 16px; text-align: left; cursor: pointer; color: var(--text); margin-bottom: 10px; width: 100%; }
        .option-btn.correct { background-color: #def7ec; border-color: var(--success); color: #03543f; }
        .option-btn.wrong { background-color: #fde8e8; border-color: var(--error); color: #9b1c1c; }
        .next-btn { width: 100%; background-color: var(--primary); color: white; border: none; border-radius: 10px; padding: 14px; font-weight: bold; cursor: pointer; display: none; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="quiz-container">
        <div id="book-screen" class="screen active">
            <h2>選擇冊別</h2>
            <div class="grid-menu">
                <button class="menu-btn" onclick="selectBook('b1')">第一冊</button>
            </div>
        </div>
        <div id="unit-screen" class="screen">
            <h2>選擇單元</h2>
            <div class="grid-menu" id="unit-list">
                <button class="menu-btn" onclick="selectUnit(1)">Unit 01</button>
                <button class="menu-btn" onclick="selectUnit(2)">Unit 02</button>
                <button class="menu-btn" onclick="selectUnit(3)">Unit 03</button>
                <button class="menu-btn" onclick="selectUnit(4)">Unit 04</button>
                <button class="menu-btn" onclick="selectUnit(5)">Unit 05</button>
                <button class="menu-btn" onclick="selectUnit(6)">Unit 06</button>
                <button class="menu-btn" onclick="selectUnit(7)">Unit 07</button>
                <button class="menu-btn" onclick="selectUnit(8)">Unit 08</button>
                <button class="menu-btn" onclick="selectUnit(9)">Unit 09</button>
                <button class="menu-btn" onclick="selectUnit(10)">Unit 10</button>
                <button class="menu-btn btn-back" onclick="switchScreen('book-screen')">回上一頁</button>
            </div>
        </div>
        <div id="mode-screen" class="screen">
            <h2>選擇模式</h2>
            <div class="grid-menu">
                <button class="menu-btn" onclick="setMode('engToCh')">英翻中</button>
                <button class="menu-btn" onclick="setMode('chToEng')">中翻英</button>
                <button class="menu-btn btn-back" onclick="switchScreen('unit-screen')">回上一頁</button>
            </div>
        </div>
        <div id="quiz-screen" class="screen">
            <div class="word-box"><div id="target-question" class="word"></div></div>
            <div id="options-container"></div>
            <button class="next-btn" id="next-btn" onclick="nextQuestion()">下一題</button>
        </div>
        <div id="result-screen" class="screen">
            <h2>測驗完成</h2>
            <div id="final-score" style="font-size: 40px; text-align: center; margin: 20px 0;"></div>
            <button class="menu-btn" style="width:100%" onclick="location.reload()">回首頁</button>
        </div>
    </div>

    <script>
        let allWordData = [];
        let wordList = [], quizQuestions = [], currentIndex = 0, correctAnswersCount = 0;
        let selectedBookId = "", selectedUnitNum = 0, quizMode = "";

        fetch('all_units.json').then(res => res.json()).then(data => allWordData = data);

        function switchScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function selectBook(id) { selectedBookId = id; switchScreen('unit-screen'); }
        
        function selectUnit(num) {
            selectedUnitNum = num;
            wordList = allWordData.filter(item => item.book === selectedBookId && item.unit === num);
            if(wordList.length < 4) { alert("單字資料不足（至少需要4個單字）"); return; }
            switchScreen('mode-screen');
        }

        function setMode(mode) { quizMode = mode; startQuiz(); }

        function startQuiz() {
            quizQuestions = wordList.map(item => {
                let options = [item[quizMode === 'engToCh' ? 'ch' : 'eng']];
                while(options.length < 4) {
                    let rand = wordList[Math.floor(Math.random()*wordList.length)];
                    let val = rand[quizMode === 'engToCh' ? 'ch' : 'eng'];
                    if(!options.includes(val)) options.push(val);
                }
                return { q: item[quizMode === 'engToCh' ? 'eng' : 'ch'], a: item[quizMode === 'engToCh' ? 'ch' : 'eng'], options: options.sort(() => Math.random()-0.5) };
            }).sort(() => Math.random()-0.5);
            currentIndex = 0; correctAnswersCount = 0; switchScreen('quiz-screen'); showQuestion();
        }

        function showQuestion() {
            let q = quizQuestions[currentIndex];
            document.getElementById('target-question').innerText = q.q;
            let container = document.getElementById('options-container');
            container.innerHTML = '';
            document.getElementById('next-btn').style.display = 'none';
            q.options.forEach(opt => {
                let btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => {
                    if(document.querySelectorAll('.option-btn.selected').length > 0) return;
                    btn.classList.add('selected');
                    if(opt === q.a) { btn.classList.add('correct'); correctAnswersCount++; }
                    else {
                        btn.classList.add('wrong');
                        document.querySelectorAll('.option-btn').forEach(b => { if(b.innerText === q.a) b.classList.add('correct'); });
                    }
                    document.getElementById('next-btn').style.display = 'block';
                };
                container.appendChild(btn);
            });
        }

        function nextQuestion() {
            currentIndex++;
            if(currentIndex < quizQuestions.length) { showQuestion(); }
            else { switchScreen('result-screen'); document.getElementById('final-score').innerText = correctAnswersCount + " / " + quizQuestions.length; }
        }
    </script>
</body>
</html>
